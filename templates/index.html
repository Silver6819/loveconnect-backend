<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>LoveConnect 💘</title>
</head>
<body>

<h1>LoveConnect 💘</h1>

<form action="/set_usuario" method="post">
    <input type="text" name="usuario" placeholder="Tu nombre" required>
    <button>Entrar</button>
</form>

<p>Usuario actual: {{ usuario_actual }}</p>

<hr>

<form action="/registro" method="post">
    <input type="text" name="nombre" placeholder="Nombre" required>
    <input type="email" name="email" placeholder="Correo" required>
    <button>Registrarse</button>
</form>

<hr>

<h2>Usuarios</h2>
<ul>
{% for u in usuarios %}
    <li><a href="/chat/{{ u }}">{{ u }}</a></li>
{% endfor %}
</ul>

<hr>

{% if chat_con %}
<h2>Chat con {{ chat_con }}</h2>

<form action="/mensaje" method="post">
    <input type="hidden" name="receptor" value="{{ chat_con }}">
    <input type="text" name="mensaje" required>
    <button>Enviar</button>
</form>

<ul>
{% for m in mensajes %}
    <li><b>{{ m[0] }}:</b> {{ m[1] }}</li>
{% endfor %}
</ul>

{% endif %}

</body>
</html>
